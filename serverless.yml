# 腾讯云 Serverless Framework 配置
# 文档: https://github.com/serverless-components/tencent-scf/blob/master/docs/configure.md

component: scf
name: kimi-proxy

inputs:
  name: kimi-proxy
  src: ./cloudfunction/kimi-proxy
  handler: index.main_handler
  runtime: Nodejs18.18
  region: ap-guangzhou
  memorySize: 512
  timeout: 60
  description: 转发Kimi多模态API请求，生成相似题型
  environment:
    variables:
      KIMI_API_KEY: ${env:KIMI_API_KEY}
      KIMI_MODEL: ${env:KIMI_MODEL}
  events:
    - apigw:
        parameters:
          serviceName: kimi-proxy-apigw
          protocols:
            - https
          environment: release
          endpoints:
            - path: /kimi-proxy
              method: POST
              enableCORS: true
